{% extends "navbar/base.html" %}
{% load static %}
{% block title %}Book Ticket{% endblock title %}

{% block head %}
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" href="{% static 'navbar/CSS/style.css' %}">
{% endblock head %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
      <div class="w-100 p-4 rounded shadow register-card">
        <h2 class="fs-3 fw-bold text-center mb-4 glow-text">Book Ticket for "{{ movie.title }}"</h2>

        <form method="post" novalidate>
          {% csrf_token %}

          <!-- Show Date (readonly) -->
          <div class="mb-3">
            <label class="form-label small fw-medium">Show Date</label>
            <input type="text" class="input1" value="{{ show_date.date }}" disabled>
            <input type="hidden" name="show_date" value="{{ show_date.date }}">
          </div>

          <!-- Show Time (readonly) -->
          <div class="mb-3">
            <label class="form-label small fw-medium">Show Time</label>
            <input type="text" class="input1" value="{{ show_time.time|time:'h:i A' }}" disabled>
            <input type="hidden" name="show_time" value="{{ show_time.time }}">
          </div>

          <!-- Ticket Count -->
          <div class="mb-3">
            <label for="ticket_count" class="form-label small fw-medium">Number of Tickets</label>
            <select id="ticket_count" name="ticket_count" class="input1" required onchange="showAttendeeInputs(this.value)">
              <option value="">-- Select --</option>
              {% for i in ticket_range %}
                <option value="{{ i }}">{{ i }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- User Inputs -->
          <div id="attendee_inputs"></div>

          <!-- Submit Button -->
          <div class="d-grid mt-4">
            <button type="submit" class="btn-rose"> Next </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Attendee Script -->
<script>
  function showAttendeeInputs(count) {
    const container = document.getElementById('attendee_inputs');
    container.innerHTML = '';

    count = parseInt(count);
    if (!count || count < 1) return;

    for (let i = 1; i <= count; i++) {
      container.innerHTML += `
        <div class="attendee-title fw-semibold mt-4"> User ${i}</div>
        <div class="row mb-3">
          <div class="col-md-4">
            <input type="text" name="user_name_${i}" class="input1" placeholder="Name" required>
          </div>
          <div class="col-md-4">
            <input type="email" name="user_email_${i}" class="input1" placeholder="Email" required>
          </div>
          <div class="col-md-4">
            <input type="text" name="user_phone_${i}" class="input1" placeholder="Phone" required>
          </div>
        </div>
      `;
    }
  }
</script>
{% endblock content %}
